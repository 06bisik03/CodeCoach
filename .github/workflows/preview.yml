name: Preview Deploy

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: preview
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    environment:
      name: preview

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/codecoach
      OPENAI_API_KEY: test-key

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build preview artifact
        run: npm run build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: preview-build-${{ github.event.pull_request.number }}
          path: |
            .next
            public
            package.json
            package-lock.json
          retention-days: 7

      - name: Comment preview status
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "Preview workflow is wired up.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "Next step: replace the placeholder deploy step in `.github/workflows/preview.yml` with your hosting provider deployment and post the live preview URL here."
            ].join("\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
