name: Staging Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: deploy-staging
    runs-on: ubuntu-latest
    environment:
      name: staging

    env:
      DATABASE_URL: postgresql://user:password@localhost:5432/codecoach
      OPENAI_API_KEY: test-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build staging artifact
        run: npm run build

      - name: Upload staging artifact
        uses: actions/upload-artifact@v7
        with:
          name: staging-build-${{ github.sha }}
          path: |
            .next
            public
            package.json
            package-lock.json
          retention-days: 14

      - name: Staging deploy placeholder
        run: |
          echo "Staging deployment scaffold is ready."
          echo "Replace this step with your real hosting provider deploy command."
